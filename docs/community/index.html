<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cover Share — 커버 영상 공유 · 발견</title>
  <meta name="description" content="누구나 커버 영상을 공유하고 발견하는 공간. 유튜브 링크만 있으면 참여할 수 있습니다." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://ytseparator.com/community/" />
  <link rel="icon" type="image/png" href="../icon.png" />
  <meta name="theme-color" content="#0f1114" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    :root {
      --bg:       #0f1114;
      --surface:  #161a20;
      --elev:     #1c2028;
      --elev-2:   #232833;
      --border:   rgba(255,255,255,.08);
      --border-mid: rgba(255,255,255,.16);
      --tx-1:     #ececef;
      --tx-2:     #9aa4b2;
      --tx-3:     #6b7280;
      --tx-4:     #4a5261;
      --accent:   #35d1a6;
      --accent-hover: #48deb4;
      --accent-fg:#071913;
      --stem-vocal: #e15b5b;
      --stem-drums: #e6c33a;
      --stem-bass:  #4b7bff;
      --stem-guitar:#f97316;
      --stem-piano: #a78bfa;
      --stem-other: #e75ea0;
      --sans: 'Pretendard Variable', Pretendard, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--tx-1);
      font-family: var(--sans);
      line-height: 1.62;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    html[lang="ko"] { word-break: keep-all; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

    .container { max-width: 980px; margin: 0 auto; padding: 0 24px; }

    /* ── Header ─────────────── */
    header {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(15,17,20,.72);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 20;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo { width: 32px; height: 32px; display: block; }
    .brand-title { font-size: 14.5px; font-weight: 700; letter-spacing: -.005em; color: var(--tx-1); }
    .brand-sub { font-size: 11px; color: var(--tx-3); font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: var(--elev);
      color: var(--tx-1);
      border: 1px solid var(--border);
      border-radius: 6px;
      font: 600 12.5px/1 var(--sans);
      cursor: pointer;
      transition: border-color .14s, background .14s, color .14s;
    }
    .btn:hover { border-color: var(--border-mid); background: var(--elev-2); color: var(--tx-1); }
    .btn.primary {
      background: var(--accent); color: var(--accent-fg);
      border-color: var(--accent);
    }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: var(--accent-fg); }
    .btn.ghost { background: transparent; }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .user-menu { display: flex; align-items: center; gap: 10px; padding: 4px 10px 4px 4px; border-radius: 999px; border: 1px solid var(--border); }
    .user-menu .name { font-size: 12.5px; color: var(--tx-2); }

    /* ── Feed ─────────────── */
    main { padding: 40px 0 80px; }
    .page-head {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
      margin-bottom: 24px;
    }
    .page-head h1 {
      font-size: clamp(24px, 3.4vw, 32px);
      font-weight: 800; letter-spacing: -.025em;
      color: var(--tx-1);
    }
    .page-head .lede { color: var(--tx-3); font-size: 13.5px; margin-top: 4px; }

    /* Sort / filter chips */
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 18px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font: 600 12px/1 var(--sans);
      color: var(--tx-2);
      cursor: pointer;
      transition: color .14s, border-color .14s, background .14s;
    }
    .chip:hover { color: var(--tx-1); border-color: var(--border-mid); }
    .chip.on {
      color: var(--accent); border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }

    /* Post cards */
    .feed { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 176px 1fr;
      gap: 0;
      transition: border-color .14s, transform .14s;
      cursor: pointer;
    }
    .card:hover { border-color: var(--border-mid); transform: translateY(-1px); }
    .thumb {
      background: var(--elev); position: relative; overflow: hidden;
      aspect-ratio: 16 / 9;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb .badge {
      position: absolute; bottom: 6px; right: 6px;
      padding: 2px 6px;
      background: rgba(0,0,0,.6);
      color: white; font-size: 10.5px; font-family: var(--mono);
      border-radius: 3px;
    }
    .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .card-title {
      font-size: 14.5px; font-weight: 700; color: var(--tx-1);
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      line-height: 1.4;
    }
    .card-song {
      font-size: 12.5px; color: var(--tx-3);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .card-song .dot { color: var(--tx-4); }
    .instrument-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px;
      font: 600 10.5px/1 var(--sans);
      border-radius: 999px;
      background: var(--elev);
      color: var(--tx-2);
      border: 1px solid var(--border);
    }
    .instrument-badge[data-i="vocals"] { color: var(--stem-vocal); border-color: color-mix(in srgb, var(--stem-vocal) 30%, transparent); }
    .instrument-badge[data-i="drums"]  { color: var(--stem-drums); border-color: color-mix(in srgb, var(--stem-drums) 30%, transparent); }
    .instrument-badge[data-i="bass"]   { color: var(--stem-bass);  border-color: color-mix(in srgb, var(--stem-bass) 30%, transparent); }
    .instrument-badge[data-i="guitar"] { color: var(--stem-guitar);border-color: color-mix(in srgb, var(--stem-guitar) 30%, transparent); }
    .instrument-badge[data-i="piano"]  { color: var(--stem-piano); border-color: color-mix(in srgb, var(--stem-piano) 30%, transparent); }
    .instrument-badge[data-i="other"]  { color: var(--stem-other); border-color: color-mix(in srgb, var(--stem-other) 30%, transparent); }

    .card-meta {
      display: flex; align-items: center; gap: 12px; margin-top: auto;
      color: var(--tx-3); font-size: 11.5px;
    }
    .card-meta .author { display: flex; align-items: center; gap: 6px; color: var(--tx-2); }
    .card-meta .author img { width: 18px; height: 18px; border-radius: 50%; }
    .card-meta .sep { color: var(--tx-4); }

    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--tx-3); font-size: 13.5px;
    }
    .empty h3 { color: var(--tx-1); font-size: 16px; margin-bottom: 6px; }

    /* ── New post modal ─────────────── */
    .modal-back {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(3px);
      display: none;
      align-items: flex-start; justify-content: center;
      padding: 60px 20px 20px;
      z-index: 50;
    }
    .modal-back.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 520px; width: 100%;
      overflow: hidden;
    }
    .modal h2 {
      font-size: 16px; font-weight: 700;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11.5px; font-weight: 600; color: var(--tx-3); letter-spacing: .04em; text-transform: uppercase; }
    .field input, .field textarea, .field select {
      background: var(--elev);
      border: 1px solid var(--border);
      color: var(--tx-1);
      padding: 9px 12px;
      border-radius: 6px;
      font: 500 13px/1.4 var(--sans);
      outline: none;
      transition: border-color .14s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field textarea { min-height: 80px; resize: vertical; }
    .field .hint { font-size: 11.5px; color: var(--tx-4); }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 14px 20px;
      background: var(--elev);
      border-top: 1px solid var(--border);
    }
    .modal-error {
      background: color-mix(in srgb, #e05a5a 12%, transparent);
      border: 1px solid color-mix(in srgb, #e05a5a 30%, transparent);
      color: #ff9090;
      padding: 10px 12px; border-radius: 6px; font-size: 12.5px;
      display: none;
    }
    .modal-error.show { display: block; }

    /* Notice */
    .notice {
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      color: var(--tx-1);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    footer {
      padding: 40px 0; text-align: center;
      border-top: 1px solid var(--border);
      color: var(--tx-4); font-size: 11.5px; font-family: var(--mono);
      letter-spacing: .04em;
    }
    footer a { color: var(--tx-2); margin: 0 10px; }

    @media (max-width: 780px) {
      .container { padding: 0 16px; }
      main { padding: 24px 0 60px; }
      .page-head { flex-direction: column; align-items: flex-start; gap: 12px; }
      .page-head h1 { font-size: 22px; }
      .page-head .btn { align-self: stretch; justify-content: center; padding: 12px 14px; }
      .toolbar { gap: 6px; }
      .toolbar > input#filter-song { width: 100%; min-width: 0; margin-top: 4px; order: 10; }
      .card { grid-template-columns: 128px 1fr; }
      .thumb { aspect-ratio: 16 / 9; }
      .card-body { padding: 11px 12px; gap: 4px; }
      .card-title { font-size: 13px; -webkit-line-clamp: 2; }
      .card-song { font-size: 11.5px; }
      .card-meta { font-size: 11px; gap: 8px; }
      .card-meta .author img { width: 16px; height: 16px; }
    }
    @media (max-width: 460px) {
      .header-row { gap: 8px; }
      .brand-title { font-size: 13.5px; }
      .brand-sub { display: none; }
      .header-actions .user-menu .name { display: none; }
      .card { grid-template-columns: 104px 1fr; }
      .card-title { font-size: 12.5px; }
      .card-meta { flex-wrap: wrap; row-gap: 2px; }
      .card-meta .sep:nth-of-type(2) { display: none; }
      .modal-back { padding: 20px 12px; align-items: flex-start; }
      .modal { border-radius: 10px; }
      .modal h2 { padding: 14px 16px; font-size: 14.5px; }
      .modal-body { padding: 14px 16px; gap: 12px; }
      .modal-actions { padding: 12px 16px; }
      .field input, .field textarea, .field select { font-size: 13.5px; padding: 10px 12px; }
      .btn { padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-row">
        <a href="./" class="brand" style="text-decoration: none;">
          <img class="brand-logo" src="../icon.png" alt="" />
          <div>
            <div class="brand-title">Cover Share</div>
            <div class="brand-sub">by YT Separator</div>
          </div>
        </a>
        <div class="header-actions" id="header-actions">
          <!-- populated by JS -->
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-head">
        <div>
          <h1>커버 영상 공유</h1>
          <div class="lede">유튜브에 올린 커버 영상을 여기서 나눠보세요 · 어떤 도구로 만들었든 환영</div>
        </div>
        <button class="btn primary" id="btn-new" style="display:none;">+ 커버 공유</button>
        <button class="btn primary" id="btn-login-cta" style="display:none;">Google 로 시작</button>
      </div>

      <div class="notice" id="notice-beta">
        <span>⚡ 초기 실험 단계 · 저작권 · 스팸 신고는 상단 프로필 (곧 추가)</span>
      </div>

      <div class="toolbar">
        <span class="chip on" data-sort="recent">최신</span>
        <span class="chip" data-sort="popular">인기</span>
        <span style="flex:1"></span>
        <input class="chip" id="filter-song" placeholder="곡 이름 검색…" style="min-width:180px; padding:6px 14px;" />
      </div>

      <div class="feed" id="feed"></div>

      <div class="empty" id="empty" style="display:none;">
        <h3>아직 공유된 커버가 없어요</h3>
        <p>유튜브에 올린 커버 영상 링크만 있으면 첫 번째로 공유할 수 있어요</p>
      </div>
    </div>
  </main>

  <!-- New post modal -->
  <div class="modal-back" id="modal-back">
    <div class="modal">
      <h2>커버 공유하기</h2>
      <div class="modal-body">
        <div class="modal-error" id="modal-error"></div>
        <div class="field">
          <label for="f-url">YouTube 링크</label>
          <input id="f-url" type="url" placeholder="https://www.youtube.com/watch?v=…" />
          <div class="hint">본인이 올린 커버 영상 링크를 붙여넣으세요 · 어떤 도구로 만들었든 OK</div>
        </div>
        <div class="field">
          <label for="f-song">곡 이름</label>
          <input id="f-song" type="text" placeholder="예: 요술왕자" maxlength="120" />
        </div>
        <div class="field">
          <label for="f-artist">아티스트 (선택)</label>
          <input id="f-artist" type="text" placeholder="예: 술탄오브더디스코" maxlength="120" />
        </div>
        <div class="field">
          <label for="f-instrument">파트</label>
          <select id="f-instrument">
            <option value="">지정 안 함</option>
            <option value="vocals">보컬</option>
            <option value="guitar">기타</option>
            <option value="bass">베이스</option>
            <option value="drums">드럼</option>
            <option value="piano">피아노</option>
            <option value="other">기타 (그 외)</option>
          </select>
        </div>
        <div class="field">
          <label for="f-desc">코멘트 (선택)</label>
          <textarea id="f-desc" maxlength="2000" placeholder="연습 팁 · 어려웠던 부분 · 감상 등"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn ghost" id="btn-cancel">취소</button>
        <button class="btn primary" id="btn-submit">공유</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <a href="/">홈</a>
      <a href="/privacy.html">개인정보</a>
      <a href="mailto:whalemindbass@gmail.com">문의</a>
      <div style="margin-top:12px;">© 2026 Whale Mind</div>
    </div>
  </footer>

  <script>
    const API = 'https://ytseparator.com/community/api';

    // ── State ─────────────────────────
    let currentUser = null;
    let currentSort = 'recent';
    let currentSong = '';

    // ── Helpers ───────────────────────
    const $ = (id) => document.getElementById(id);
    async function api(path, opts = {}) {
      const r = await fetch(API + path, { credentials: 'include', ...opts });
      return { status: r.status, data: await r.json().catch(() => null) };
    }
    function fmtWhen(ts) {
      const d = new Date(ts);
      const diff = Date.now() - ts;
      if (diff < 60_000) return '방금 전';
      if (diff < 3600_000) return Math.floor(diff / 60_000) + '분 전';
      if (diff < 86400_000) return Math.floor(diff / 3600_000) + '시간 전';
      if (diff < 7 * 86400_000) return Math.floor(diff / 86400_000) + '일 전';
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    const INST_LABEL = { vocals: '보컬', guitar: '기타', bass: '베이스', drums: '드럼', piano: '피아노', other: '기타' };

    // ── Header ────────────────────────
    async function loadUser() {
      const r = await api('/me');
      currentUser = r.data?.user || null;
      renderHeader();
    }
    function renderHeader() {
      const el = $('header-actions');
      const btnNew = $('btn-new');
      const btnCta = $('btn-login-cta');
      if (currentUser) {
        el.innerHTML = `
          <a class="user-menu" href="./profile.html?id=${encodeURIComponent(currentUser.id)}" style="text-decoration:none;color:inherit">
            <img class="avatar" src="${currentUser.avatar || ''}" alt="" />
            <span class="name">${escapeHtml(currentUser.name)}</span>
          </a>
          <button class="btn ghost" id="btn-logout">로그아웃</button>
        `;
        $('btn-logout').onclick = async () => {
          await api('/auth/logout', { method: 'POST' });
          currentUser = null; renderHeader();
        };
        btnNew.style.display = '';
        btnCta.style.display = 'none';
      } else {
        el.innerHTML = `<a class="btn primary" href="${API}/auth/google?returnTo=/community/">Google 로그인</a>`;
        btnNew.style.display = 'none';
        btnCta.style.display = '';
      }
    }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // ── Feed ──────────────────────────
    async function loadFeed() {
      const params = new URLSearchParams();
      params.set('sort', currentSort);
      if (currentSong) params.set('song', currentSong);
      const r = await api('/posts?' + params.toString());
      const items = r.data?.items || [];
      renderFeed(items);
    }
    function renderFeed(items) {
      const feed = $('feed');
      const empty = $('empty');
      if (!items.length) {
        feed.innerHTML = '';
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';
      feed.innerHTML = items.map(p => {
        const thumb = `https://i.ytimg.com/vi/${p.video_id}/mqdefault.jpg`;
        const inst = p.instrument ? `<span class="instrument-badge" data-i="${p.instrument}">${INST_LABEL[p.instrument] || p.instrument}</span>` : '';
        return `
          <div class="card" data-id="${p.id}" onclick="location.href='./post.html?id=${p.id}'">
            <div class="thumb"><img src="${thumb}" alt="" loading="lazy"/></div>
            <div class="card-body">
              <div class="card-title">${escapeHtml(p.title)}</div>
              <div class="card-song">
                <span>${escapeHtml(p.song_name)}</span>
                ${p.song_artist ? `<span class="dot">·</span><span>${escapeHtml(p.song_artist)}</span>` : ''}
                ${inst ? `<span class="dot">·</span>${inst}` : ''}
              </div>
              <div class="card-meta">
                <a class="author" href="./profile.html?id=${encodeURIComponent(p.author.id)}" onclick="event.stopPropagation()" style="text-decoration:none;color:inherit">
                  ${p.author.avatar ? `<img src="${escapeHtml(p.author.avatar)}" alt="" />` : ''}
                  <span>${escapeHtml(p.author.name)}</span>
                </a>
                <span class="sep">·</span><span>${fmtWhen(p.created_at)}</span>
                <span class="sep">·</span><span>♥ ${p.like_count}</span>
                <span class="sep">·</span><span>💬 ${p.comment_count}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Sort chip
    document.querySelectorAll('.chip[data-sort]').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.chip[data-sort]').forEach(x => x.classList.remove('on'));
        el.classList.add('on');
        currentSort = el.dataset.sort;
        loadFeed();
      });
    });
    // Song filter (debounced)
    let songTimer = null;
    $('filter-song').addEventListener('input', (e) => {
      clearTimeout(songTimer);
      songTimer = setTimeout(() => { currentSong = e.target.value.trim(); loadFeed(); }, 300);
    });

    // ── New post ─────────────────────
    const modal = $('modal-back');
    function openModal() {
      if (!currentUser) { location.href = `${API}/auth/google?returnTo=/community/`; return; }
      $('modal-error').classList.remove('show');
      ['f-url','f-song','f-artist','f-desc'].forEach(id => $(id).value = '');
      $('f-instrument').value = '';
      modal.classList.add('open');
      setTimeout(() => $('f-url').focus(), 30);
    }
    function closeModal() { modal.classList.remove('open'); }
    $('btn-new').onclick = openModal;
    $('btn-login-cta').onclick = () => { location.href = `${API}/auth/google?returnTo=/community/`; };
    $('btn-cancel').onclick = closeModal;
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    $('btn-submit').onclick = async () => {
      const err = $('modal-error');
      err.classList.remove('show');
      const body = {
        url: $('f-url').value.trim(),
        song_name: $('f-song').value.trim(),
        song_artist: $('f-artist').value.trim() || null,
        instrument: $('f-instrument').value || null,
        description: $('f-desc').value.trim() || null,
      };
      if (!body.url || !body.song_name) {
        err.textContent = 'YouTube 링크와 곡 이름은 필수입니다';
        err.classList.add('show');
        return;
      }
      $('btn-submit').disabled = true;
      const r = await api('/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      $('btn-submit').disabled = false;
      if (r.status === 201 || r.data?.ok) {
        closeModal();
        loadFeed();
      } else {
        err.textContent = r.data?.error || '오류가 발생했습니다';
        err.classList.add('show');
      }
    };

    // ── Init ─────────────────────────
    (async () => {
      await loadUser();
      loadFeed();
    })();
  </script>
</body>
</html>
