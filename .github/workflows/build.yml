# Build Windows installer artifacts.
#
# 트리거:
#   - 태그(v*) push  → Setup.exe + Portable.exe artifact 업로드
#   - 수동 실행       → 동일
#
# SignPath Foundation 승인 후 아래 서명 스텝을 추가할 예정.
# https://about.signpath.io/documentation/foundation

name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --publish never

      # SignPath 승인 후 여기서 서명 스텝 추가 예정 (submitting artifact + polling)
      # - name: Submit artifact to SignPath for signing
      #   uses: signpath/github-action-submit-signing-request@v1
      #   ...

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yt-separator-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          retention-days: 30
